[package]
name = "bsv-messagebox-client"
version = "0.1.0"
edition = "2021"
rust-version = "1.87"

[lib]
name = "bsv_messagebox_client"

[dependencies]
bsv-sdk = { git = "https://github.com/b1narydt/bsv-rust-sdk", branch = "main", features = ["network"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
async-trait = "0.1"
thiserror = "2"
rust_socketio = { version = "0.6", features = ["async"] }
futures-util = "0.3"
hex = "0.4"

[dev-dependencies]
wiremock = "0.6"
tokio-test = "0.4"
